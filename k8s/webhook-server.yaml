apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-server
  namespace: latte-pr-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webhook-server
  template:
    metadata:
      labels:
        app: webhook-server
    spec:
      containers:
        - name: webhook-server
          image: latte-pr-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
          envFrom:
            - configMapRef:
                name: latte-config
            - secretRef:
                name: latte-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:$(POSTGRES_PASSWORD)@postgres:5432/code_review"
            - name: SYNC_DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/code_review"
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-server
  namespace: latte-pr-agent
spec:
  selector:
    app: webhook-server
  ports:
    - port: 80
      targetPort: 8000
