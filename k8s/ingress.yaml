apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: latte-ingress
  namespace: latte-pr-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: latte.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webhook-server
                port:
                  number: 80
