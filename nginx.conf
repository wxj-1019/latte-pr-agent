events {
    worker_connections 1024;
}

http {
    upstream webhook_backend {
        least_conn;
        server webhook-server:8000;
    }

    upstream frontend_backend {
        server frontend:3001;
    }

    server {
        listen 80;
        client_max_body_size 50M;

        # Backend API routes - proxy to FastAPI
        location ~ ^/(reviews|configs|settings|stats|webhook|health|prompts|projects|commits|repos|feedback) {
            proxy_pass http://webhook_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE stream - special handling
        location /reviews/stream {
            proxy_pass http://webhook_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # Everything else - frontend Next.js
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
